{% if pagination and pagination.pages > 1 %}
<nav aria-label="Paginación">
  <ul class="pagination pagination-sm mt-3 mb-0">
    <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
      <a class="page-link" href="{{ url_for('tasks.manage_tasks', project_id=project.id, page=pagination.prev_num, hide_completed=1 if hide_completed else 0) if pagination.has_prev else '#' }}">Anterior</a>
    </li>
    {% for page_num in pagination.iter_pages(left_edge=1, right_edge=1, left_current=1, right_current=2) %}
      {% if page_num %}
        <li class="page-item {% if page_num == pagination.page %}active{% endif %}">
          <a class="page-link" href="{{ url_for('tasks.manage_tasks', project_id=project.id, page=page_num, hide_completed=1 if hide_completed else 0) }}">{{ page_num }}</a>
        </li>
      {% else %}
        <li class="page-item disabled"><span class="page-link">...</span></li>
      {% endif %}
    {% endfor %}
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
      <a class="page-link" href="{{ url_for('tasks.manage_tasks', project_id=project.id, page=pagination.next_num, hide_completed=1 if hide_completed else 0) if pagination.has_next else '#' }}">Siguiente</a>
    </li>
  </ul>
</nav>
{% endif %}

{% if pagination.pages > 1 %}
<nav aria-label="Paginación">
  <ul class="pagination pagination-sm mt-3">
    <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
      <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.prev_num, **(filter_args or {})) if pagination.has_prev else '#' }}">Anterior</a>
    </li>
    {% for page_num in pagination.iter_pages(left_edge=1, right_edge=1, left_current=1, right_current=2) %}
      {% if page_num %}
        <li class="page-item {% if page_num == pagination.page %}active{% endif %}">
          <a class="page-link" href="{{ url_for(request.endpoint, page=page_num, **(filter_args or {})) }}">{{ page_num }}</a>
        </li>
      {% else %}
        <li class="page-item disabled"><span class="page-link">...</span></li>
      {% endif %}
    {% endfor %}
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
      <a class="page-link" href="{{ url_for(request.endpoint, page=pagination.next_num, **(filter_args or {})) if pagination.has_next else '#' }}">Siguiente</a>
    </li>
  </ul>
</nav>
{% endif %}

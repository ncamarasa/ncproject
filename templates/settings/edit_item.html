{% extends 'dashboard/layout.html' %}
{% block title %}Editar {{ kind|capitalize }} | LTAdmin Flask{% endblock %}
{% block page_title %}Editar {{ kind }}{% endblock %}
{% block page_actions %}
<a href="{{ back_url if back_url is defined else url_for('settings.company_types' if kind == 'tipo de empresa' else 'settings.payment_types') }}" class="btn btn-outline-secondary btn-sm btn-action-standard">Volver</a>
{% endblock %}
{% block dashboard_content %}
<div class="card border-0 metric-card">
  <div class="card-body">
    <form method="post" class="form-inline">
      <label class="mr-2">Nombre</label>
      <input name="name" class="form-control mr-2" required value="{{ item.name }}">
      <button class="btn btn-primary btn-action-standard" type="submit">Guardar cambios</button>
    </form>
  </div>
</div>
{% endblock %}

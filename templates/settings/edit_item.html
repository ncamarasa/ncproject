{% extends 'dashboard/layout.html' %}
{% block title %}Editar {{ kind|capitalize }} | NCProject{% endblock %}
{% block page_title %}Editar {{ kind }}{% endblock %}
{% block page_actions %}
<a href="{{ back_url if back_url is defined else url_for('settings.company_types' if kind == 'tipo de empresa' else 'settings.payment_types') }}" class="btn btn-outline-secondary btn-sm btn-action-standard">Volver</a>
{% endblock %}
{% block dashboard_content %}
<div class="card border-0 metric-card form-mode-card form-mode-edit">
  <div class="card-header d-flex justify-content-between align-items-center">
    <strong>Editar {{ kind }}</strong>
    <span class="badge form-mode-badge">Modo edición</span>
  </div>
  <div class="card-body">
    <form method="post" class="form-inline">
      <label class="mr-2">Nombre</label>
      <input name="name" class="form-control mr-2" required value="{{ item.name }}">
      <button class="btn btn-primary btn-sm btn-action-standard mr-2" type="submit">Guardar cambios</button>
      <a href="{{ back_url if back_url is defined else url_for('settings.company_types' if kind == 'tipo de empresa' else 'settings.payment_types') }}" class="btn btn-outline-secondary btn-sm btn-action-standard">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
